name: Build and Release MSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PROJECT_PATH: TickyNote/TickyNote.csproj
  CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build
      run: dotnet build ${{ env.PROJECT_PATH }} -c ${{ env.CONFIGURATION }} --no-restore

    - name: Publish x64
      run: dotnet publish ${{ env.PROJECT_PATH }} -c ${{ env.CONFIGURATION }} -r win-x64 --self-contained -o ./publish/x64

    - name: Create self-signed certificate
      run: |
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=sriapathre" -KeyUsage DigitalSignature -FriendlyName "TickyNote Signing Certificate" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        $password = ConvertTo-SecureString -String "TickyNote123!" -Force -AsPlainText
        Export-PfxCertificate -Cert $cert -FilePath ./TickyNote.pfx -Password $password
      shell: pwsh

    - name: Create MSIX package
      run: |
        # Install makeappx from Windows SDK
        $sdkPath = "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22621.0\x64"
        & "$sdkPath\makeappx.exe" pack /d ./publish/x64 /p ./TickyNote.msix /o
      shell: pwsh

    - name: Sign MSIX package
      run: |
        $sdkPath = "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.0.22621.0\x64"
        & "$sdkPath\signtool.exe" sign /fd SHA256 /a /f ./TickyNote.pfx /p "TickyNote123!" ./TickyNote.msix
      shell: pwsh

    - name: Upload MSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: TickyNote-MSIX
        path: ./TickyNote.msix

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ./TickyNote.msix
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
