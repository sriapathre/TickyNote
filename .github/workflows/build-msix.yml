name: Build and Release MSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PROJECT_PATH: TickyNote/TickyNote.csproj
  CONFIGURATION: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build
      run: dotnet build ${{ env.PROJECT_PATH }} -c ${{ env.CONFIGURATION }} --no-restore

    - name: Publish x64
      run: dotnet publish ${{ env.PROJECT_PATH }} -c ${{ env.CONFIGURATION }} -r win-x64 --self-contained -o ./publish/x64

    - name: Prepare MSIX package files
      run: |
        # Copy manifest as AppxManifest.xml
        Copy-Item -Path "TickyNote/Package.appxmanifest" -Destination "./publish/x64/AppxManifest.xml"

        # Create Assets folder in publish directory
        New-Item -Path "./publish/x64/Assets" -ItemType Directory -Force

        # Copy required MSIX assets
        Copy-Item -Path "TickyNote/Assets/StoreLogo.png" -Destination "./publish/x64/Assets/"
        Copy-Item -Path "TickyNote/Assets/Square44x44Logo.png" -Destination "./publish/x64/Assets/"
        Copy-Item -Path "TickyNote/Assets/Square150x150Logo.png" -Destination "./publish/x64/Assets/"
        Copy-Item -Path "TickyNote/Assets/Wide310x150Logo.png" -Destination "./publish/x64/Assets/"
        Copy-Item -Path "TickyNote/Assets/SplashScreen.png" -Destination "./publish/x64/Assets/"
      shell: pwsh

    - name: Create self-signed certificate
      run: |
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=sriapathre" -KeyUsage DigitalSignature -FriendlyName "TickyNote Signing Certificate" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        $password = ConvertTo-SecureString -String "TickyNote123!" -Force -AsPlainText
        Export-PfxCertificate -Cert $cert -FilePath ./TickyNote.pfx -Password $password
      shell: pwsh

    - name: Find Windows SDK and create MSIX
      run: |
        # Find the latest Windows SDK
        $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
        $sdkVersions = Get-ChildItem -Path $sdkRoot -Directory | Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } | Sort-Object Name -Descending
        $latestSdk = $sdkVersions | Select-Object -First 1
        $sdkPath = Join-Path $latestSdk.FullName "x64"
        Write-Host "Using Windows SDK at: $sdkPath"

        # Create MSIX
        $makeappx = Join-Path $sdkPath "makeappx.exe"
        & $makeappx pack /d ./publish/x64 /p ./TickyNote.msix /o
      shell: pwsh

    - name: Sign MSIX package
      run: |
        # Find the latest Windows SDK
        $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
        $sdkVersions = Get-ChildItem -Path $sdkRoot -Directory | Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } | Sort-Object Name -Descending
        $latestSdk = $sdkVersions | Select-Object -First 1
        $sdkPath = Join-Path $latestSdk.FullName "x64"

        # Sign MSIX
        $signtool = Join-Path $sdkPath "signtool.exe"
        & $signtool sign /fd SHA256 /a /f ./TickyNote.pfx /p "TickyNote123!" ./TickyNote.msix
      shell: pwsh

    - name: Upload MSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: TickyNote-MSIX
        path: ./TickyNote.msix

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ./TickyNote.msix
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
